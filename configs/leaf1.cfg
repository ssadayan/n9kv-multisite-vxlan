hostname leaf1

feature ospf
feature bgp
feature nv overlay
feature vn-segment-vlan-based
feature fabric forwarding
nv overlay evpn

! ---- VLANs (Site 1, Leaf1 carries VLAN 10) ----
vlan 10
  name TENANT-A
  vn-segment 100010

fabric forwarding anycast-gateway-mac 0000.2222.3333

! ---- Loopback: Router-ID / VTEP ----
interface loopback0
  description RID-and-VTEP
  ip address 10.1.0.11/32
  ip router ospf UNDERLAY area 0

! ---- Underlay to Spine1 ----
interface Ethernet1/1
  description to-spine1
  no switchport
  ip address 10.10.2.2/30
  ip ospf network point-to-point
  ip router ospf UNDERLAY area 0
  mtu 9150
  no shutdown

! ---- Access to Server1 (VLAN 10) ----
interface Ethernet1/10
  description to-server1
  switchport
  switchport mode trunk
  switchport trunk allowed vlan 10
  spanning-tree port type edge trunk
  no shutdown

! Disable unused interfaces
interface Ethernet1/2-9
  shutdown
interface Ethernet1/11-64
  shutdown

! ---- SVI: Anycast Gateway for VLAN 10 ----
interface Vlan10
  no shutdown
  ip address 192.168.10.254/24
  fabric forwarding mode anycast-gateway

! ---- NVE: VXLAN Tunnel ----
interface nve1
  no shutdown
  host-reachability protocol bgp
  source-interface loopback0
  member vni 100010
    ingress-replication protocol bgp

router ospf UNDERLAY
  router-id 10.1.0.11

! ---- BGP: iBGP to Site-1 RR (spine1) ----
router bgp 65001
  router-id 10.1.0.11
  address-family l2vpn evpn
  neighbor 10.1.0.1
    remote-as 65001
    update-source loopback0
    address-family l2vpn evpn
      send-community extended

evpn
  vni 100010 l2
    rd auto
    route-target import auto
    route-target export auto
