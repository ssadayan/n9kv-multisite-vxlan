hostname s2-bgw1

feature ospf
feature bgp
feature vn-segment-vlan-based
feature nv overlay

nv overlay evpn
evpn multisite border-gateway 2

! ---- VLANs / VN-Segments ----
vlan 10
  name TENANT-A
  vn-segment 100010

! ---- Underlay OSPF ----
router ospf UNDERLAY
  router-id 10.2.0.21

interface loopback0
  description BGP-RID
  ip address 10.2.0.21/32
  ip router ospf UNDERLAY area 0.0.0.0

interface loopback1
  description NVE-VTEP-Source
  ip address 10.2.0.121/32
  ip router ospf UNDERLAY area 0.0.0.0

interface loopback100
  description Multisite-BGW-Loopback
  ip address 10.2.100.21/32

! ---- Leaf-facing links (fabric-tracking) ----
interface Ethernet1/1
  description to-s2-leaf1
  no switchport
  mtu 9150
  ip address 10.2.1.1/30
  ip ospf network point-to-point
  ip router ospf UNDERLAY area 0.0.0.0
  evpn multisite fabric-tracking
  no shutdown

interface Ethernet1/2
  description to-s2-leaf2
  no switchport
  mtu 9150
  ip address 10.2.2.1/30
  ip ospf network point-to-point
  ip router ospf UNDERLAY area 0.0.0.0
  evpn multisite fabric-tracking
  no shutdown

! ---- DCI Link (dci-tracking) ----
interface Ethernet1/5
  description DCI-to-s1-bgw1
  no switchport
  mtu 9150
  ip address 172.16.0.2/30
  evpn multisite dci-tracking
  no shutdown

! ---- Reachability to remote BGW loopback100 ----
ip route 10.1.100.21/32 172.16.0.1

! ---- VXLAN NVE ----
interface nve1
  no shutdown
  host-reachability protocol bgp
  source-interface loopback1
  multisite border-gateway interface loopback100
  member vni 100010
    ingress-replication protocol bgp
    suppress-arp

! ---- BGP: RR for leaves + iBGP peer with s2-bgw2 + eBGP to remote site ----
router bgp 65002
  router-id 10.2.0.21
  address-family l2vpn evpn
    retain route-target all
    advertise-pip
  ! iBGP RR clients — site 2 leaves
  neighbor 10.2.0.11
    remote-as 65002
    update-source loopback0
    address-family l2vpn evpn
      send-community extended
      route-reflector-client
  neighbor 10.2.0.12
    remote-as 65002
    update-source loopback0
    address-family l2vpn evpn
      send-community extended
      route-reflector-client
  ! iBGP peer with s2-bgw2 (RR-to-RR, not a client)
  neighbor 10.2.0.22
    remote-as 65002
    update-source loopback0
    address-family l2vpn evpn
      send-community extended
  ! eBGP to remote site BGW1
  neighbor 10.1.100.21
    remote-as 65001
    update-source loopback100
    ebgp-multihop 5
    address-family l2vpn evpn
      send-community extended

! ---- EVPN VNI Bindings ----
evpn
  vni 100010 l2
    rd auto
    route-target import 1:100010
    route-target export 1:100010
