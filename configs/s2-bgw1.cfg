hostname s2-bgw1

feature ospf
feature bgp
feature vn-segment-vlan-based
feature nv overlay

nv overlay evpn
! Site-ID 2 — must be unique per site across the multisite domain
evpn multisite border-gateway 2

! ---- VLANs / VN-Segments ----
vlan 10
  name TENANT-A
  vn-segment 100010

! ---- Underlay OSPF (intra-site only) ----
router ospf UNDERLAY
  router-id 10.2.0.21

interface loopback0
  description BGP-RID
  ip address 10.2.0.21/32
  ip router ospf UNDERLAY area 0.0.0.0

interface loopback1
  description NVE-VTEP-Source
  ip address 10.2.0.121/32
  ip router ospf UNDERLAY area 0.0.0.0

interface loopback100
  description Multisite-BGW-Loopback
  ip address 10.2.100.21/32
  ! Not in OSPF — reachable from remote site via static route

! ---- Fabric Links (spine-facing, with fabric-tracking) ----
interface Ethernet1/1
  description to-s2-spine1
  no switchport
  mtu 9150
  ip address 10.2.3.2/30
  ip ospf network point-to-point
  ip router ospf UNDERLAY area 0.0.0.0
  evpn multisite fabric-tracking
  no shutdown

interface Ethernet1/2
  description to-s2-spine2
  no switchport
  mtu 9150
  ip address 10.2.6.2/30
  ip ospf network point-to-point
  ip router ospf UNDERLAY area 0.0.0.0
  evpn multisite fabric-tracking
  no shutdown

! ---- DCI Link (with dci-tracking) ----
interface Ethernet1/5
  description DCI-to-s1-bgw1
  no switchport
  mtu 9150
  ip address 172.16.0.2/30
  evpn multisite dci-tracking
  no shutdown

! ---- Reachability to remote BGW multisite loopback ----
ip route 10.1.100.21/32 172.16.0.1

! ---- VXLAN NVE — multisite BGW ----
interface nve1
  no shutdown
  host-reachability protocol bgp
  source-interface loopback1
  multisite border-gateway interface loopback100
  member vni 100010
    ingress-replication protocol bgp
    suppress-arp

! ---- BGP: iBGP to site RRs + eBGP to remote BGW ----
router bgp 65002
  router-id 10.2.0.21
  address-family l2vpn evpn
    advertise-pip
  ! iBGP — site-2 spines (Route Reflectors)
  neighbor 10.2.0.1
    remote-as 65002
    update-source loopback0
    address-family l2vpn evpn
      send-community extended
  neighbor 10.2.0.2
    remote-as 65002
    update-source loopback0
    address-family l2vpn evpn
      send-community extended
  ! eBGP — remote site BGW (multisite loopback peering)
  neighbor 10.1.100.21
    remote-as 65001
    update-source loopback100
    ebgp-multihop 5
    address-family l2vpn evpn
      send-community extended

! ---- EVPN VNI Bindings (same RT as site 1 — cross-site stretch) ----
evpn
  vni 100010 l2
    rd auto
    route-target import 1:100010
    route-target export 1:100010
