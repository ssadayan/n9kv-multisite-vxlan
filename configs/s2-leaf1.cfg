icam monitor scale

line console
line vty
router ospf UNDERLAY
  router-id 10.2.0.11
router bgp 65002
  router-id 10.2.0.11
  address-family l2vpn evpn
  neighbor 10.2.0.21
    remote-as 65002
    update-source loopback0
    address-family l2vpn evpn
      send-community extended
  neighbor 10.2.0.22
    remote-as 65002
    update-source loopback0
    address-family l2vpn evpn
      send-community extended
  vrf vxlan-1001
    address-family ipv4 unicast
      advertise l2vpn evpn
      redistribute direct route-map PERMIT_ALL
