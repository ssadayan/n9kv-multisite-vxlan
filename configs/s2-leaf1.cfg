

version 9.3(16) Bios:version  
hostname s2-leaf1
vdc s2-leaf1 id 1
  limit-resource vlan minimum 16 maximum 4094
  limit-resource vrf minimum 2 maximum 4096
  limit-resource port-channel minimum 0 maximum 511
  limit-resource u4route-mem minimum 248 maximum 248
  limit-resource u6route-mem minimum 96 maximum 96
  limit-resource m4route-mem minimum 58 maximum 58
  limit-resource m6route-mem minimum 8 maximum 8

feature telnet
feature nxapi
feature scp-server
nv overlay evpn
feature ospf
feature bgp
feature netconf
feature grpc
feature interface-vlan
feature fabric forwarding
feature pim
feature pim6
feature vn-segment-vlan-based
feature nv overlay

no password strength-check
terminal dont-ask
username admin password 5 $5$MMBCJN$1eqBI0DKNnZpWBdsbq5lAIXo/7C4MPELUJqoRRujffB  role network-admin
ssh key rsa 2048 
ip domain-lookup
copp profile strict
snmp-server user admin network-admin auth md5 0142233798FC91B4E6B7002F83D3B97CB3E3 priv 33182938C6F785BD80B11B2699DF897CF9EB localizedV2key
rmon event 1 log trap public description FATAL(1) owner PMON@FATAL
rmon event 2 log trap public description CRITICAL(2) owner PMON@CRITICAL
rmon event 3 log trap public description ERROR(3) owner PMON@ERROR
rmon event 4 log trap public description WARNING(4) owner PMON@WARNING
rmon event 5 log trap public description INFORMATION(5) owner PMON@INFO

fabric forwarding anycast-gateway-mac 0000.2222.3333
ip pim rp-address 102.102.102.102 group-list 224.0.0.0/4
route-map PERMIT_ALL permit 10
vlan 1,10,20,1001
vlan 10
  name TENANT-A
  vn-segment 100010
vlan 20
  name TENANT-B
  vn-segment 100020
vlan 1001
  name VRF-vxlan-1001-L3VNI
  vn-segment 1001

vrf context management
  ip route 0.0.0.0/0 10.0.0.2
  ipv6 route ::/0 2001:db8::1

vrf context vxlan-1001
  ip pim rp-address 101.1.1.1 group-list 224.0.0.0/4
  ip pim ssm range 232.0.0.0/8
  ip multicast multipath s-g-hash next-hop-based
  ipv6 multicast multipath sg-nexthop-hash
  vni 1001
  rd auto
  address-family ipv4 unicast
    route-target both auto
    route-target both auto mvpn
    route-target both auto evpn
  address-family ipv6 unicast
    route-target both auto
    route-target both auto mvpn
    route-target both auto evpn

interface Vlan10
  no shutdown
  vrf member vxlan-1001
  no ip redirects
  ip address 192.168.1.100/24
  ipv6 nd suppress-ra
  no ipv6 redirects
  ip pim sparse-mode
  fabric forwarding mode anycast-gateway

interface Vlan20
  no shutdown
  vrf member vxlan-1001
  no ip redirects
  ip address 192.168.2.100/24
  ipv6 nd suppress-ra
  no ipv6 redirects
  ip pim sparse-mode
  fabric forwarding mode anycast-gateway

interface Vlan1001
  no shutdown
  mtu 9216
  vrf member vxlan-1001
  no ip redirects
  ip forward
  ipv6 address use-link-local-only
  no ipv6 redirects
  ip pim sparse-mode
  ipv6 pim sparse-mode

interface nve1
  no shutdown
  host-reachability protocol bgp
  source-interface loopback1
  member vni 100010
    ingress-replication protocol bgp
  member vni 100020
    mcast-group 225.0.0.1
  member vni 1001 associate-vrf

interface Ethernet1/1
  description to-s2-bgw1
  no switchport
  mtu 9150
  ip address 10.2.1.2/30
  ip ospf network point-to-point
  ip router ospf UNDERLAY area 0.0.0.0
  ip pim sparse-mode
  no shutdown

interface Ethernet1/2
  description to-s2-bgw2
  no switchport
  mtu 9150
  ip address 10.2.3.2/30
  ip ospf network point-to-point
  ip router ospf UNDERLAY area 0.0.0.0
  ip pim sparse-mode
  no shutdown

