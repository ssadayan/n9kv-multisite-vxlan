hostname s1-spine1

feature ospf
feature bgp
feature nv overlay

nv overlay evpn

! ---- Underlay OSPF ----
router ospf UNDERLAY
  router-id 10.1.0.1

interface loopback0
  ip address 10.1.0.1/32
  ip router ospf UNDERLAY area 0.0.0.0

! ---- Fabric Links ----
interface Ethernet1/1
  description to-s1-leaf1
  no switchport
  mtu 9150
  ip address 10.1.1.1/30
  ip ospf network point-to-point
  ip router ospf UNDERLAY area 0.0.0.0
  no shutdown

interface Ethernet1/2
  description to-s1-leaf2
  no switchport
  mtu 9150
  ip address 10.1.2.1/30
  ip ospf network point-to-point
  ip router ospf UNDERLAY area 0.0.0.0
  no shutdown

interface Ethernet1/3
  description to-s1-bgw1
  no switchport
  mtu 9150
  ip address 10.1.3.1/30
  ip ospf network point-to-point
  ip router ospf UNDERLAY area 0.0.0.0
  no shutdown

interface Ethernet1/4
  description to-s1-bgw2
  no switchport
  mtu 9150
  ip address 10.1.7.1/30
  ip ospf network point-to-point
  ip router ospf UNDERLAY area 0.0.0.0
  no shutdown

! ---- EVPN Route Reflector ----
router bgp 65001
  router-id 10.1.0.1
  address-family l2vpn evpn
    retain route-target all
  neighbor 10.1.0.11
    remote-as 65001
    update-source loopback0
    address-family l2vpn evpn
      send-community extended
      route-reflector-client
  neighbor 10.1.0.12
    remote-as 65001
    update-source loopback0
    address-family l2vpn evpn
      send-community extended
      route-reflector-client
  neighbor 10.1.0.21
    remote-as 65001
    update-source loopback0
    address-family l2vpn evpn
      send-community extended
      route-reflector-client
  neighbor 10.1.0.22
    remote-as 65001
    update-source loopback0
    address-family l2vpn evpn
      send-community extended
      route-reflector-client
