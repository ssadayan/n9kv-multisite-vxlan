hostname leaf2

feature ospf
feature bgp
feature nv overlay
feature vn-segment-vlan-based
feature fabric forwarding
nv overlay evpn

! ---- VLANs (Site 1, Leaf2 carries VLAN 20) ----
vlan 20
  name TENANT-B
  vn-segment 100020

fabric forwarding anycast-gateway-mac 0000.2222.3333

! ---- Loopback: Router-ID / VTEP ----
interface loopback0
  description RID-and-VTEP
  ip address 10.1.0.12/32
  ip router ospf UNDERLAY area 0

! ---- Underlay to Spine1 ----
interface Ethernet1/1
  description to-spine1
  no switchport
  ip address 10.10.3.2/30
  ip ospf network point-to-point
  ip router ospf UNDERLAY area 0
  mtu 9150
  no shutdown

! ---- Access to Server2 (VLAN 20) ----
interface Ethernet1/10
  description to-server2
  switchport
  switchport mode trunk
  switchport trunk allowed vlan 20
  spanning-tree port type edge trunk
  no shutdown

! Disable unused interfaces
interface Ethernet1/2-9
  shutdown
interface Ethernet1/11-64
  shutdown

! ---- SVI: Anycast Gateway for VLAN 20 ----
interface Vlan20
  no shutdown
  ip address 192.168.20.254/24
  fabric forwarding mode anycast-gateway

! ---- NVE: VXLAN Tunnel ----
interface nve1
  no shutdown
  host-reachability protocol bgp
  source-interface loopback0
  member vni 100020
    ingress-replication protocol bgp

router ospf UNDERLAY
  router-id 10.1.0.12

! ---- BGP: iBGP to Site-1 RR (spine1) ----
router bgp 65001
  router-id 10.1.0.12
  address-family l2vpn evpn
  neighbor 10.1.0.1
    remote-as 65001
    update-source loopback0
    address-family l2vpn evpn
      send-community extended

evpn
  vni 100020 l2
    rd auto
    route-target import auto
    route-target export auto
