hostname s1-leaf2

feature ospf
feature bgp
feature vn-segment-vlan-based
feature nv overlay

nv overlay evpn

! ---- VLANs / VN-Segments ----
vlan 10
  name TENANT-A
  vn-segment 100010

! ---- Underlay OSPF ----
router ospf UNDERLAY
  router-id 10.1.0.12

interface loopback0
  description BGP-RID
  ip address 10.1.0.12/32
  ip router ospf UNDERLAY area 0.0.0.0

interface loopback1
  description NVE-VTEP-Source
  ip address 10.1.0.112/32
  ip router ospf UNDERLAY area 0.0.0.0

! ---- Uplinks to BGWs (direct, no spine) ----
interface Ethernet1/1
  description to-s1-bgw1
  no switchport
  mtu 9150
  ip address 10.1.2.2/30
  ip ospf network point-to-point
  ip router ospf UNDERLAY area 0.0.0.0
  no shutdown

interface Ethernet1/2
  description to-s1-bgw2
  no switchport
  mtu 9150
  ip address 10.1.4.2/30
  ip ospf network point-to-point
  ip router ospf UNDERLAY area 0.0.0.0
  no shutdown

! ---- Server Access Port ----
interface Ethernet1/10
  description to-srv2
  switchport
  switchport mode access
  switchport access vlan 10
  spanning-tree portfast
  no shutdown

! ---- VXLAN NVE ----
interface nve1
  no shutdown
  host-reachability protocol bgp
  source-interface loopback1
  member vni 100010
    ingress-replication protocol bgp
    suppress-arp

! ---- EVPN BGP (RR clients to both BGWs) ----
router bgp 65001
  router-id 10.1.0.12
  address-family l2vpn evpn
  neighbor 10.1.0.21
    remote-as 65001
    update-source loopback0
    address-family l2vpn evpn
      send-community extended
  neighbor 10.1.0.22
    remote-as 65001
    update-source loopback0
    address-family l2vpn evpn
      send-community extended

! ---- EVPN VNI Bindings ----
evpn
  vni 100010 l2
    rd auto
    route-target import 1:100010
    route-target export 1:100010
