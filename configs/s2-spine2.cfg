hostname s2-spine2

feature ospf
feature bgp

! ---- Underlay OSPF ----
router ospf UNDERLAY
  router-id 10.2.0.2

interface loopback0
  ip address 10.2.0.2/32
  ip router ospf UNDERLAY area 0.0.0.0

! ---- Fabric Links ----
interface Ethernet1/1
  description to-s2-leaf1
  no switchport
  mtu 9150
  ip address 10.2.4.1/30
  ip ospf network point-to-point
  ip router ospf UNDERLAY area 0.0.0.0
  no shutdown

interface Ethernet1/2
  description to-s2-leaf2
  no switchport
  mtu 9150
  ip address 10.2.5.1/30
  ip ospf network point-to-point
  ip router ospf UNDERLAY area 0.0.0.0
  no shutdown

interface Ethernet1/3
  description to-s2-bgw1
  no switchport
  mtu 9150
  ip address 10.2.6.1/30
  ip ospf network point-to-point
  ip router ospf UNDERLAY area 0.0.0.0
  no shutdown

interface Ethernet1/4
  description to-s2-bgw2
  no switchport
  mtu 9150
  ip address 10.2.8.1/30
  ip ospf network point-to-point
  ip router ospf UNDERLAY area 0.0.0.0
  no shutdown

! ---- EVPN Route Reflector ----
router bgp 65002
  router-id 10.2.0.2
  address-family l2vpn evpn
    retain route-target all
  neighbor 10.2.0.11
    remote-as 65002
    update-source loopback0
    address-family l2vpn evpn
      send-community extended
      route-reflector-client
  neighbor 10.2.0.12
    remote-as 65002
    update-source loopback0
    address-family l2vpn evpn
      send-community extended
      route-reflector-client
  neighbor 10.2.0.21
    remote-as 65002
    update-source loopback0
    address-family l2vpn evpn
      send-community extended
      route-reflector-client
  neighbor 10.2.0.22
    remote-as 65002
    update-source loopback0
    address-family l2vpn evpn
      send-community extended
      route-reflector-client
