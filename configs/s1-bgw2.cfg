hostname s1-bgw2

feature ospf
feature bgp
feature vn-segment-vlan-based
feature nv overlay

nv overlay evpn
! Site-ID 1 — must be unique per site across the multisite domain
evpn multisite border-gateway 1

! ---- VLANs / VN-Segments ----
vlan 10
  name TENANT-A
  vn-segment 100010

! ---- Underlay OSPF (intra-site only) ----
router ospf UNDERLAY
  router-id 10.1.0.22

interface loopback0
  description BGP-RID
  ip address 10.1.0.22/32
  ip router ospf UNDERLAY area 0.0.0.0

interface loopback1
  description NVE-VTEP-Source
  ip address 10.1.0.122/32
  ip router ospf UNDERLAY area 0.0.0.0

interface loopback100
  description Multisite-BGW-Loopback
  ip address 10.1.100.22/32
  ! Not in OSPF — reachable from remote site via static route

! ---- Fabric Links (spine-facing, with fabric-tracking) ----
interface Ethernet1/1
  description to-s1-spine1
  no switchport
  mtu 9150
  ip address 10.1.7.2/30
  ip ospf network point-to-point
  ip router ospf UNDERLAY area 0.0.0.0
  evpn multisite fabric-tracking
  no shutdown

interface Ethernet1/2
  description to-s1-spine2
  no switchport
  mtu 9150
  ip address 10.1.8.2/30
  ip ospf network point-to-point
  ip router ospf UNDERLAY area 0.0.0.0
  evpn multisite fabric-tracking
  no shutdown

! ---- DCI Link (with dci-tracking) ----
interface Ethernet1/5
  description DCI-to-s2-bgw2
  no switchport
  mtu 9150
  ip address 172.16.1.1/30
  evpn multisite dci-tracking
  no shutdown

! ---- Reachability to remote BGW multisite loopback ----
ip route 10.2.100.22/32 172.16.1.2

! ---- VXLAN NVE — multisite BGW ----
interface nve1
  no shutdown
  host-reachability protocol bgp
  source-interface loopback1
  multisite border-gateway interface loopback100
  member vni 100010
    ingress-replication protocol bgp
    suppress-arp

! ---- BGP: iBGP to site RRs + eBGP to remote BGW ----
router bgp 65001
  router-id 10.1.0.22
  address-family l2vpn evpn
    advertise-pip
  ! iBGP — site-1 spines (Route Reflectors)
  neighbor 10.1.0.1
    remote-as 65001
    update-source loopback0
    address-family l2vpn evpn
      send-community extended
  neighbor 10.1.0.2
    remote-as 65001
    update-source loopback0
    address-family l2vpn evpn
      send-community extended
  ! eBGP — remote site BGW2 (multisite loopback peering)
  neighbor 10.2.100.22
    remote-as 65002
    update-source loopback100
    ebgp-multihop 5
    address-family l2vpn evpn
      send-community extended

! ---- EVPN VNI Bindings (same RT as leaves — shared across sites) ----
evpn
  vni 100010 l2
    rd auto
    route-target import 1:100010
    route-target export 1:100010
