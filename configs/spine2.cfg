hostname spine2

feature ospf
feature bgp
feature nv overlay
nv overlay evpn

! ---- Loopback ----
interface loopback0
  ip address 10.2.0.1/32
  ip router ospf UNDERLAY area 0

! ---- Underlay to BGW2 ----
interface Ethernet1/1
  description to-bgw2
  no switchport
  ip address 10.20.1.1/30
  ip ospf network point-to-point
  ip router ospf UNDERLAY area 0
  mtu 9150
  no shutdown

! ---- Underlay to Leaf3 ----
interface Ethernet1/2
  description to-leaf3
  no switchport
  ip address 10.20.2.1/30
  ip ospf network point-to-point
  ip router ospf UNDERLAY area 0
  mtu 9150
  no shutdown

! ---- Underlay to Leaf4 ----
interface Ethernet1/3
  description to-leaf4
  no switchport
  ip address 10.20.3.1/30
  ip ospf network point-to-point
  ip router ospf UNDERLAY area 0
  mtu 9150
  no shutdown

! Disable unused interfaces
interface Ethernet1/4-64
  shutdown

router ospf UNDERLAY
  router-id 10.2.0.1

! ---- BGP: Route Reflector for Site 2 ----
router bgp 65002
  router-id 10.2.0.1
  address-family l2vpn evpn
    retain route-target all
  neighbor 10.2.0.2
    remote-as 65002
    update-source loopback0
    address-family l2vpn evpn
      send-community extended
      route-reflector-client
  neighbor 10.2.0.11
    remote-as 65002
    update-source loopback0
    address-family l2vpn evpn
      send-community extended
      route-reflector-client
  neighbor 10.2.0.12
    remote-as 65002
    update-source loopback0
    address-family l2vpn evpn
      send-community extended
      route-reflector-client
