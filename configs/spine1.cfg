hostname spine1

feature ospf
feature bgp
feature nv overlay
nv overlay evpn

! ---- Loopback ----
interface loopback0
  ip address 10.1.0.1/32
  ip router ospf UNDERLAY area 0

! ---- Underlay to BGW1 ----
interface Ethernet1/1
  description to-bgw1
  no switchport
  ip address 10.10.1.1/30
  ip ospf network point-to-point
  ip router ospf UNDERLAY area 0
  mtu 9150
  no shutdown

! ---- Underlay to Leaf1 ----
interface Ethernet1/2
  description to-leaf1
  no switchport
  ip address 10.10.2.1/30
  ip ospf network point-to-point
  ip router ospf UNDERLAY area 0
  mtu 9150
  no shutdown

! ---- Underlay to Leaf2 ----
interface Ethernet1/3
  description to-leaf2
  no switchport
  ip address 10.10.3.1/30
  ip ospf network point-to-point
  ip router ospf UNDERLAY area 0
  mtu 9150
  no shutdown

! Disable unused interfaces
interface Ethernet1/4-64
  shutdown

router ospf UNDERLAY
  router-id 10.1.0.1

! ---- BGP: Route Reflector for Site 1 ----
router bgp 65001
  router-id 10.1.0.1
  address-family l2vpn evpn
    retain route-target all
  neighbor 10.1.0.2
    remote-as 65001
    update-source loopback0
    address-family l2vpn evpn
      send-community extended
      route-reflector-client
  neighbor 10.1.0.11
    remote-as 65001
    update-source loopback0
    address-family l2vpn evpn
      send-community extended
      route-reflector-client
  neighbor 10.1.0.12
    remote-as 65001
    update-source loopback0
    address-family l2vpn evpn
      send-community extended
      route-reflector-client
