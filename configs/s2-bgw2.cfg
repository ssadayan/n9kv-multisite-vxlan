  ip pim sparse-mode
icam monitor scale

line console
line vty
router ospf UNDERLAY
  router-id 10.2.0.22
  redistribute static route-map PERMIT_ALL
router bgp 65002
  router-id 10.2.0.22
  address-family l2vpn evpn
    retain route-target all
    advertise-pip
  neighbor 10.1.0.21
    remote-as 65001
    update-source loopback0
    ebgp-multihop 5
    peer-type fabric-external
    address-family l2vpn evpn
      send-community extended
  neighbor 10.1.0.22
    remote-as 65001
    update-source loopback0
    ebgp-multihop 5
    peer-type fabric-external
    address-family l2vpn evpn
      send-community extended
  neighbor 10.2.0.11
    remote-as 65002
    update-source loopback0
    address-family l2vpn evpn
      send-community extended
      route-reflector-client
  neighbor 10.2.0.12
    remote-as 65002
    update-source loopback0
    address-family l2vpn evpn
      send-community extended
      route-reflector-client
  neighbor 10.2.0.21
    remote-as 65002
    update-source loopback100
    address-family l2vpn evpn
      send-community extended
  vrf vxlan-1001
    address-family ipv4 unicast
      advertise l2vpn evpn
      redistribute direct route-map PERMIT_ALL
evpn
  vni 100010 l2
    rd auto
    route-target import 1:100010
    route-target export 1:100010
  vni 100020 l2
    rd auto
    route-target import 1:100020
    route-target export 1:100020



