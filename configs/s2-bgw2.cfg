interface loopback0
  description BGP-RID
  ip address 10.2.0.22/32
  ip router ospf UNDERLAY area 0.0.0.0

interface loopback1
  description NVE-VTEP-Source
  ip address 10.2.0.122/32
  ip router ospf UNDERLAY area 0.0.0.0

interface loopback100
  description Multisite-BGW-Loopback
  ip address 10.2.100.21/32
  ip router ospf UNDERLAY area 0.0.0.0

