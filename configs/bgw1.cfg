hostname bgw1

feature ospf
feature bgp
feature nv overlay
feature vn-segment-vlan-based
feature fabric forwarding
nv overlay evpn

! ---- Multi-Site Border Gateway ----
evpn multisite border-gateway 1000
  delay-restore time 300

! ---- VLANs ----
vlan 10
  name TENANT-A
  vn-segment 100010
vlan 20
  name TENANT-B
  vn-segment 100020

! ---- Loopback 0: Router-ID / VTEP ----
interface loopback0
  description RID-and-VTEP
  ip address 10.1.0.2/32
  ip router ospf UNDERLAY area 0

! ---- Loopback 100: Multi-Site DCI source ----
interface loopback100
  description multisite-DCI-source
  ip address 1.1.1.1/32

! ---- Site 1 Underlay to Spine1 ----
interface Ethernet1/1
  description to-spine1
  no switchport
  ip address 10.10.1.2/30
  ip ospf network point-to-point
  ip router ospf UNDERLAY area 0
  mtu 9150
  no shutdown

! ---- DCI to BGW2 (Site 2) ----
interface Ethernet1/2
  description DCI-to-bgw2
  no switchport
  ip address 192.168.100.1/30
  no shutdown

! Disable unused interfaces
interface Ethernet1/3-64
  shutdown

! ---- NVE: VXLAN tunnel with Multi-Site ----
interface nve1
  no shutdown
  host-reachability protocol bgp
  source-interface loopback0
  multisite border-gateway interface loopback100
  member vni 100010
    multisite ingress-replication
    ingress-replication protocol bgp
  member vni 100020
    multisite ingress-replication
    ingress-replication protocol bgp

router ospf UNDERLAY
  router-id 10.1.0.2

! ---- BGP: iBGP with Site-1 RR + eBGP DCI to BGW2 ----
router bgp 65001
  router-id 10.1.0.2
  address-family l2vpn evpn
    advertise-pip
  neighbor 10.1.0.1
    remote-as 65001
    update-source loopback0
    address-family l2vpn evpn
      send-community extended
  neighbor 192.168.100.2
    remote-as 65002
    update-source loopback100
    ebgp-multihop 5
    peer-type fabric-external
    address-family l2vpn evpn
      send-community extended
      rewrite-evpn-rt-asn

evpn
  vni 100010 l2
    rd auto
    route-target import auto
    route-target export auto
  vni 100020 l2
    rd auto
    route-target import auto
    route-target export auto
