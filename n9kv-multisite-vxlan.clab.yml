# VXLAN EVPN Multisite Lab - Cisco Nexus 9000v
#
# Topology:
#   Site 1 (AS 65001, Site-ID 1): s1-spine1, s1-spine2, s1-leaf1, s1-leaf2, s1-bgw1, s1-bgw2
#   Site 2 (AS 65002, Site-ID 2): s2-spine1, s2-spine2, s2-leaf1, s2-leaf2, s2-bgw1, s2-bgw2
#   DCI: s1-bgw1:eth5 <-> s2-bgw1:eth5 (172.16.0.0/30)
#        s1-bgw2:eth5 <-> s2-bgw2:eth5 (172.16.1.0/30)
#
# Stretched L2 VNI:
#   VLAN 10 / VNI 100010 / subnet 192.168.10.0/24 (stretched across both sites)
#
# Underlay: OSPF (process UNDERLAY, area 0)
# Overlay:  iBGP EVPN with spine Route Reflectors per site
#           eBGP EVPN between BGWs (multisite border gateways)
#
# Image: vrnetlab/cisco_n9kv:9500v64-10.5.5.M
#   Build: git clone https://github.com/srl-labs/vrnetlab /tmp/vrnetlab
#          cp nexus9500v64.10.5.5.M.qcow2 /tmp/vrnetlab/cisco/n9kv/n9kv-9500v64-10.5.5.M.qcow2
#          cd /tmp/vrnetlab/cisco/n9kv && make docker-image
# Resources: 4 vCPU + 10GB RAM per node × 12 nodes = ~120GB RAM required

name: multisite-vxlan

topology:
  kinds:
    cisco_n9kv:
      image: vrnetlab/cisco_n9kv:9500v64-10.5.5.M
    linux:
      image: ghcr.io/hellt/network-multitool

  nodes:
    # =========================================================
    # SITE 1
    # =========================================================
    s1-spine1:
      kind: cisco_n9kv
      startup-config: configs/s1-spine1.cfg

    s1-spine2:
      kind: cisco_n9kv
      startup-config: configs/s1-spine2.cfg

    s1-leaf1:
      kind: cisco_n9kv
      startup-config: configs/s1-leaf1.cfg

    s1-leaf2:
      kind: cisco_n9kv
      startup-config: configs/s1-leaf2.cfg

    s1-bgw1:
      kind: cisco_n9kv
      startup-config: configs/s1-bgw1.cfg

    s1-bgw2:
      kind: cisco_n9kv
      startup-config: configs/s1-bgw2.cfg

    srv1:
      kind: linux
      exec:
        - ip addr add 192.168.10.1/24 dev eth1
        - ip link set eth1 up

    srv2:
      kind: linux
      exec:
        - ip addr add 192.168.10.2/24 dev eth1
        - ip link set eth1 up

    # =========================================================
    # SITE 2
    # =========================================================
    s2-spine1:
      kind: cisco_n9kv
      startup-config: configs/s2-spine1.cfg

    s2-spine2:
      kind: cisco_n9kv
      startup-config: configs/s2-spine2.cfg

    s2-leaf1:
      kind: cisco_n9kv
      startup-config: configs/s2-leaf1.cfg

    s2-leaf2:
      kind: cisco_n9kv
      startup-config: configs/s2-leaf2.cfg

    s2-bgw1:
      kind: cisco_n9kv
      startup-config: configs/s2-bgw1.cfg

    s2-bgw2:
      kind: cisco_n9kv
      startup-config: configs/s2-bgw2.cfg

    srv3:
      kind: linux
      exec:
        - ip addr add 192.168.10.3/24 dev eth1
        - ip link set eth1 up

    srv4:
      kind: linux
      exec:
        - ip addr add 192.168.10.4/24 dev eth1
        - ip link set eth1 up

  links:
    # =========================================================
    # SITE 1 FABRIC  (eth1=Eth1/1, eth2=Eth1/2, eth3=Eth1/3, eth4=Eth1/4)
    # =========================================================
    # Spine1 downlinks
    - endpoints: ["s1-spine1:eth1", "s1-leaf1:eth1"]
    - endpoints: ["s1-spine1:eth2", "s1-leaf2:eth1"]
    - endpoints: ["s1-spine1:eth3", "s1-bgw1:eth1"]
    - endpoints: ["s1-spine1:eth4", "s1-bgw2:eth1"]
    # Spine2 downlinks
    - endpoints: ["s1-spine2:eth1", "s1-leaf1:eth2"]
    - endpoints: ["s1-spine2:eth2", "s1-leaf2:eth2"]
    - endpoints: ["s1-spine2:eth3", "s1-bgw1:eth2"]
    - endpoints: ["s1-spine2:eth4", "s1-bgw2:eth2"]
    # Server access links (eth10=Eth1/10)
    - endpoints: ["s1-leaf1:eth10", "srv1:eth1"]
    - endpoints: ["s1-leaf2:eth10", "srv2:eth1"]

    # =========================================================
    # SITE 2 FABRIC
    # =========================================================
    # Spine1 downlinks
    - endpoints: ["s2-spine1:eth1", "s2-leaf1:eth1"]
    - endpoints: ["s2-spine1:eth2", "s2-leaf2:eth1"]
    - endpoints: ["s2-spine1:eth3", "s2-bgw1:eth1"]
    - endpoints: ["s2-spine1:eth4", "s2-bgw2:eth1"]
    # Spine2 downlinks
    - endpoints: ["s2-spine2:eth1", "s2-leaf1:eth2"]
    - endpoints: ["s2-spine2:eth2", "s2-leaf2:eth2"]
    - endpoints: ["s2-spine2:eth3", "s2-bgw1:eth2"]
    - endpoints: ["s2-spine2:eth4", "s2-bgw2:eth2"]
    # Server access links
    - endpoints: ["s2-leaf1:eth10", "srv3:eth1"]
    - endpoints: ["s2-leaf2:eth10", "srv4:eth1"]

    # =========================================================
    # DCI — Data Center Interconnect (eth5=Eth1/5)
    # =========================================================
    - endpoints: ["s1-bgw1:eth5", "s2-bgw1:eth5"]
    - endpoints: ["s1-bgw2:eth5", "s2-bgw2:eth5"]
