# VXLAN EVPN Multisite Lab - Cisco Nexus 9000v (Spineless)
#
# Topology:
#   Site 1 (AS 65001, Site-ID 1): s1-leaf1, s1-leaf2, s1-bgw1, s1-bgw2
#   Site 2 (AS 65002, Site-ID 2): s2-leaf1, s2-leaf2, s2-bgw1, s2-bgw2
#   DCI: s1-bgw1:eth5 <-> s2-bgw1:eth5 (172.16.0.0/30)
#        s1-bgw2:eth5 <-> s2-bgw2:eth5 (172.16.1.0/30)
#        s1-bgw1:eth6 <-> s2-bgw2:eth6 (172.16.2.0/30)  [full-mesh]
#        s1-bgw2:eth6 <-> s2-bgw1:eth6 (172.16.3.0/30)  [full-mesh]
#
# BGWs act as EVPN Route Reflectors for leaves (no spine layer)
# Each leaf connects directly to both BGWs (dual uplinks)
#
# Stretched L2 VNI:
#   VLAN 10 / VNI 100010 / subnet 192.168.10.0/24 (stretched across both sites)
#
# Underlay: OSPF (process UNDERLAY, area 0)
# Overlay:  iBGP EVPN — BGWs are RRs, leaves are RR clients
#           eBGP EVPN between BGW pairs across DCI
#
# Image: vrnetlab/cisco_n9kv:9300v-9.3.16
# Resources: 4 vCPU + 10GB RAM per node × 8 nodes = ~80GB RAM required

name: multisite-vxlan

topology:
  kinds:
    cisco_n9kv:
      image: vrnetlab/cisco_n9kv:9300v-9.3.16
    linux:
      image: ghcr.io/hellt/network-multitool

  nodes:
    # =========================================================
    # SITE 1
    # =========================================================
    s1-leaf1:
      kind: cisco_n9kv
      startup-config: configs/s1-leaf1.cfg

    s1-leaf2:
      kind: cisco_n9kv
      startup-config: configs/s1-leaf2.cfg

    s1-bgw1:
      kind: cisco_n9kv
      startup-config: configs/s1-bgw1.cfg

    s1-bgw2:
      kind: cisco_n9kv
      startup-config: configs/s1-bgw2.cfg

    srv1:
      kind: linux
      exec:
        - ip addr add 192.168.10.1/24 dev eth1
        - ip link set eth1 up

    srv2:
      kind: linux
      exec:
        - ip addr add 192.168.10.2/24 dev eth1
        - ip link set eth1 up

    # =========================================================
    # SITE 2
    # =========================================================
    s2-leaf1:
      kind: cisco_n9kv
      startup-config: configs/s2-leaf1.cfg

    s2-leaf2:
      kind: cisco_n9kv
      startup-config: configs/s2-leaf2.cfg

    s2-bgw1:
      kind: cisco_n9kv
      startup-config: configs/s2-bgw1.cfg

    s2-bgw2:
      kind: cisco_n9kv
      startup-config: configs/s2-bgw2.cfg

    srv3:
      kind: linux
      exec:
        - ip addr add 192.168.10.3/24 dev eth1
        - ip link set eth1 up

    srv4:
      kind: linux
      exec:
        - ip addr add 192.168.10.4/24 dev eth1
        - ip link set eth1 up

    srv5:
      kind: linux
      exec:
        - ip addr add 192.168.10.5/24 dev eth1
        - ip link set eth1 up

    srv6:
      kind: linux
      exec:
        - ip addr add 192.168.10.6/24 dev eth1
        - ip link set eth1 up

  links:
    # =========================================================
    # SITE 1 — Leaf-to-BGW direct links (no spine)
    # =========================================================
    - endpoints: ["s1-bgw1:eth1", "s1-leaf1:eth1"]
    - endpoints: ["s1-bgw1:eth2", "s1-leaf2:eth1"]
    - endpoints: ["s1-bgw2:eth1", "s1-leaf1:eth2"]
    - endpoints: ["s1-bgw2:eth2", "s1-leaf2:eth2"]
    # Server access
    - endpoints: ["s1-leaf1:eth10", "srv1:eth1"]
    - endpoints: ["s1-leaf1:eth11", "srv5:eth1"]
    - endpoints: ["s1-leaf2:eth10", "srv2:eth1"]

    # =========================================================
    # SITE 2 — Leaf-to-BGW direct links (no spine)
    # =========================================================
    - endpoints: ["s2-bgw1:eth1", "s2-leaf1:eth1"]
    - endpoints: ["s2-bgw1:eth2", "s2-leaf2:eth1"]
    - endpoints: ["s2-bgw2:eth1", "s2-leaf1:eth2"]
    - endpoints: ["s2-bgw2:eth2", "s2-leaf2:eth2"]
    # Server access
    - endpoints: ["s2-leaf1:eth10", "srv3:eth1"]
    - endpoints: ["s2-leaf1:eth11", "srv6:eth1"]
    - endpoints: ["s2-leaf2:eth10", "srv4:eth1"]

    # =========================================================
    # DCI — Data Center Interconnect (eth5=Eth1/5)
    # =========================================================
    - endpoints: ["s1-bgw1:eth5", "s2-bgw1:eth5"]
    - endpoints: ["s1-bgw2:eth5", "s2-bgw2:eth5"]
    - endpoints: ["s1-bgw1:eth6", "s2-bgw2:eth6"]
    - endpoints: ["s1-bgw2:eth6", "s2-bgw1:eth6"]
